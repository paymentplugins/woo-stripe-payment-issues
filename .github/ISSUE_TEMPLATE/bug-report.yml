name: 🐞 Bug Report
description: Report a bug if something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for taking the time to report this!

        Please fill out the information below as thoroughly as possible.
        Bug reports lacking detail may be closed without action.

        Before submitting, please:
        - Check the [documentation](https://paymentplugins.com/documentation/stripe)
        - Search [existing issues](../../issues) to avoid duplicates

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm these before submitting.
      options:
        - label: I have carried out troubleshooting steps and I believe I have found a bug.
          required: true
        - label: I have searched existing issues and cannot find a duplicate.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: A clear and concise description of what actually happens.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Attach screenshots or recordings by dragging & dropping.
      placeholder: |
        1. Go to
        2. Click on
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Fatal Error logs
      description: |
        Go to **WooCommerce > Status**, click "Logs", then check if there is a "fatal-errors" log file that 
        corresponds to the bug you're reporting. This will allow us to review any errors that are being triggered.
      value: |
        Paste the log entry (if it exists) that corresponds to the bug you're reporting
    validations:
      required: true

  - type: checkboxes
    id: isolating
    attributes:
      label: Isolating the problem
      options:
        - label: I have deactivated all other plugins and the bug still occurs.
          required: false
        - label: I have tested with a default WordPress theme (e.g. Storefront) and the bug still occurs.
          required: false
        - label: I can reproduce this bug consistently using the steps above.
          required: true